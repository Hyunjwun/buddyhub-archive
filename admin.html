<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyHub Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

#adminGallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
}

.filename{
  padding:10px;
  background:#eee;
  font-size:12px;
}

.wish{
  padding:12px;
}

.deleteBtn{
  width:100%;
  border:none;
  padding:12px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>BuddyHub Admin</h1>

<div id="adminGallery"></div>

<script src="admin.js"></script>

</body>
</html>
